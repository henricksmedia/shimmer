name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-and-import:
    name: Syntax & import check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile all Python sources
        run: python -m compileall -q .

      - name: Import smoke test (server + CLI)
        run: |
          python -c "import shimmer, shimmer.server, shimmer.cli, shimmer.engine, shimmer.presets, shimmer.audio_io, shimmer.probe, shimmer.dsp, shimmer.params, shimmer.jobs, shimmer.settings_store"

      - name: Run test suite
        run: python -m pytest tests/ -q
